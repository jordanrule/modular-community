context:
  version: "0.1.0"

package:
  name: "turing"
  version: ${{ version }}

source:
  - git: https://github.com/TuringCore/turing.git
    rev: 4ec01d45e0995162483816617c88ad9045399c64

build:
  number: 1
  script:
    - mkdir -p ${PREFIX}/lib/mojo
    - mojo package src/turing -o ${{ PREFIX }}/lib/mojo/turing.mojopkg

requirements:
  host:
    - mojo-compiler
  build:
    - mojo-compiler
  run:
    - mojo-compiler

tests:
  - script:
      - if: unix
        then:
          - mojo -I src tests/test_hkt_demo.mojo
          - mojo -I src tests/test_inference_paths.mojo
    files:
      source:
        - src/turing/
        - tests/

about:
  homepage: https://github.com/TuringCore/turing
  license: BSD-3-Clause
  license_file: LICENSE
  summary: A focused Mojo library for Bayesian probabilistic programming with HKT-style type safety and practical inference engine paths.
  repository: https://github.com/TuringCore/turing.git

extra:
  project_name: Turing
  maintainers:
    - jrule

